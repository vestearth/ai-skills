name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Verify Ruby manifest runtime
        run: ruby --version
      - name: Validate skills, playbooks, and adapters
        run: bash scripts/validate-skills.sh
      - name: Smoke-test the Cursor installer
        run: bash scripts/test-install-cursor.sh
      - name: Smoke-test the Claude installer
        run: bash scripts/test-install-claude.sh
      - name: Smoke-test the named-agent installer
        run: bash scripts/test-install-agents.sh
      - name: Whitespace and conflict-marker check (PR)
        if: github.event_name == 'pull_request'
        run: git diff --check "origin/${{ github.base_ref }}...HEAD"
